<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="01_userProfileForm.css">
    <title>유저 프로필 폼</title>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>USER PROFILE FORM</h1>
        </div>
        <div class="photoArea">
            <div class="p-title">Photo Upload Area</div>
            <div class="p-photo"><img src="" alt="프로필"></div>
            <div>
                <button type="button" class="p-button">UPLOAD PHOTO</button>
            </div>
        </div>

        <div class="main">
            <div class="m-item">
                <label for="fullname">Full Name</label>
                <input name="fullname" id="fullname" class="m-item-input"></input>
            </div>
            <div class="m-item">
                <label for="job">Job Title</label>
                <input name="jop" id="job" class="m-item-input"></input>
            </div>
            <div class="m-item">
                <label for="email">Email Adress</label>
                <input type="email" name="email" id="email" class="m-item-input" placeholder="email" ></input>
            </div>
            <div class="m-item">
                <label for="bio">Brief Bio</label>
                <textarea name="bio" id="bio" class="m-item-input" placeholder="A short bio about yoursrlf..."></textarea>
            </div>
        </div>
        <div class="checkbox">
            <div class="c-item">Online Link to Include</div>
            <div class="c-box">
                <div>
                    <input type="checkbox" name="includee-link" id="portfolio">
                    <label for="portfolio">Portfolio</label>
                </div>
                <div>
                    <input type="checkbox" name="includee-link" id="linkedln">
                    <label for="linkedln">Linkedn</label>
                </div>
                <div>
                    <input type="checkbox" name="includee-link" id="github">
                    <label for="github">Github</label>
                </div>
            </div>
        </div>
        <div class="save">
            <button type="submit" class="save-btn">SAVE PROFILE</button>
        </div>
    </div>
</body>
</html>
